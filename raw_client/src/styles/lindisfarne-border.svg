    <!-- lines -->
    <g>
        <!-- thin line just below dots-->
        <rect x="8.5" y="8.5" width="25" height="25" fill="none" stroke="rgb(134, 127, 91)"
            stroke-width="1" />
        <!-- thick line -->
        <rect x="13.5" y="13.5" width="15" height="15" fill="none" stroke="rgb(55, 43, 39)"
            stroke-width="5" />
        <!-- inner thin line -->
        <rect x="18.5" y="18.5" width="5" height="5" fill="none" stroke="rgb(134, 127, 91)"
            stroke-width="1" />
    </g>
